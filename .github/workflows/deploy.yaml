name: Deploy to ECS
on:
  push:
    branches:
      - main
jobs:  
 deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build, tag, and push image
        run: |
          docker build -t my-flask-app .
          docker tag my-flask-app:latest 637675605421.dkr.ecr.us-east-1.amazonaws.com/my-flask-app:latest
          docker push 637675605421.dkr.ecr.us-east-1.amazonaws.com/my-flask-app:latest
      - name: Deploy to Amazon ECS
        run: |
          aws ecs describe-task-definition   --task-definition flask-task   --region us-east-1   --query 'taskDefinition'   > ecs-task-def.json
        image uri: 637675605421.dkr.ecr.us-east-1.amazonaws.com/my-flask-app:latest
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: my-flask-app
          image: 637675605421.dkr.ecr.us-east-1.amazonaws.com/my-flask-app:latest
